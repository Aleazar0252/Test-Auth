<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Google Sign-In</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px;">

    <h2>Login with Google</h2>

    <div id="g_id_onload"
         data-client_id="961119886049-jvubclgn13eihs030pqr553acddgci8f.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-shape="pill"
         data-theme="outline"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left"
         style="display: flex; justify-content: center;">
    </div>

    <div id="user-info" style="margin-top: 30px;"></div>

    <script>
        // 4. Handle the response when the user successfully logs in
        function handleCredentialResponse(response) {
            // Google returns a JWT (JSON Web Token) credential
            console.log("Encoded JWT ID token: " + response.credential);

            // Decode the JWT to read the user's profile information
            const responsePayload = decodeJwtResponse(response.credential);

            console.log("ID: " + responsePayload.sub);
            console.log("Full Name: " + responsePayload.name);
            console.log("Image URL: " + responsePayload.picture);
            console.log("Email: " + responsePayload.email);

            // Display the user's information on the web page
            document.getElementById('user-info').innerHTML = `
                <h3>Welcome, ${responsePayload.name}!</h3>
                <img src="${responsePayload.picture}" alt="Profile Picture" style="border-radius: 50%; width: 100px;">
                <p><strong>Email:</strong> ${responsePayload.email}</p>
            `;
            
            // Hide the login button after successful login
            document.querySelector('.g_id_signin').style.display = 'none';
        }

        // Helper function to decode the JWT token on the frontend
        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }
    </script>

</body>
</html>
