<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication App</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #777;
        }
        .tab.active {
            color: #0066cc;
            border-bottom: 2px solid #0066cc;
            margin-bottom: -2px;
        }
        .form-view {
            display: none;
        }
        .form-view.active {
            display: block;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #333;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-primary {
            width: 100%;
            padding: 10px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary:hover {
            background-color: #005bb5;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #777;
            font-size: 14px;
            position: relative;
        }
        .divider::before, .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background-color: #ccc;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        #message-box {
            display: none;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <div id="message-box"></div>

        <div id="login-view" class="form-view active">
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <div class="divider">OR</div>

            <div id="g_id_onload"
                 data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com"
                 data-context="signin"
                 data-ux_mode="popup"
                 data-callback="handleGoogleLogin"
                 data-auto_prompt="false">
            </div>
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="continue_with"
                 data-size="large"
                 data-logo_alignment="left"
                 style="display: flex; justify-content: center;">
            </div>
        </div>

        <div id="register-view" class="form-view">
            <form onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="input-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" required>
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required minlength="6">
                </div>
                <div class="input-group">
                    <label for="reg-confirm-password">Confirm Password</label>
                    <input type="password" id="reg-confirm-password" required minlength="6">
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
        </div>

    </div>

    <script>
        // Switch between Login and Register tabs
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.form-view').forEach(view => view.classList.remove('active'));
            document.getElementById('message-box').style.display = 'none';

            if (tabName === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-view').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-view').classList.add('active');
            }
        }

        // Show success/error messages
        function showMessage(msg, type) {
            const msgBox = document.getElementById('message-box');
            msgBox.innerHTML = msg;
            msgBox.className = type; 
            msgBox.style.display = 'block';
        }

        // Handle standard email/password Login
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            // In a real app, you would send this to your backend to verify the password and check if the email is confirmed
            showMessage(`Logging in... Backend needs to verify if ${email} is confirmed.`, 'success');
        }

        // Handle Registration
        function handleRegister(event) {
            event.preventDefault();
            
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;
            const email = document.getElementById('reg-email').value;

            // 1. Frontend Validation: Check if passwords match
            if (password !== confirmPassword) {
                showMessage('Passwords do not match. Please try again.', 'error');
                return;
            }

            // 2. Simulate Backend Handoff
            // Here you would use fetch() to send the Name, Username, Email, and Password to your database.
            // The database saves the user as "unverified" and triggers the email.
            
            showMessage(`Success! A verification link has been sent to <strong>${email}</strong>. You must verify your email before logging in.`, 'success');
            
            // Clear the form
            event.target.reset();
        }

        // Handle Google Sign-In
        function handleGoogleLogin(response) {
            console.log("Google JWT: " + response.credential);
            // In a real app, send response.credential to your backend to create a session.
            showMessage("Successfully authenticated with Google! No email verification required.", 'success');
        }
    </script>
</body>
</html>
